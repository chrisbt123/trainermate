<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TrainerMate Zoom connection</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background: linear-gradient(180deg, #081225, #0c1830);
      color: #f3f4f6;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(680px, 100%);
      border: 1px solid rgba(148,163,184,.18);
      border-radius: 22px;
      background: rgba(17,24,39,.92);
      padding: 26px;
      box-shadow: 0 24px 70px rgba(0,0,0,.28);
    }
    h1 { margin: 0 0 10px; font-size: 24px; }
    p { color: #9ca3af; line-height: 1.55; }
    code {
      background: rgba(0,0,0,.35);
      padding: 2px 6px;
      border-radius: 8px;
      color: #d1d5db;
    }
    .btn {
      display: inline-block;
      margin-top: 14px;
      padding: 11px 16px;
      border-radius: 12px;
      background: linear-gradient(135deg,#2563eb,#1d4ed8);
      color: white;
      text-decoration: none;
      font-weight: 700;
    }
    .error { color: #fecaca; }
    .small { font-size: 13px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Connecting Zoom to TrainerMate…</h1>
    <p id="status">Sending Zoom back to the TrainerMate app running on this computer.</p>
    <p class="small">TrainerMate must be open locally for this to complete.</p>
    <p id="manual" class="small"></p>
  </main>

  <script>
    (function () {
      const statusEl = document.getElementById("status");
      const manualEl = document.getElementById("manual");
      const params = new URLSearchParams(window.location.search);
      const hash = window.location.hash || "";
      const code = params.get("code");
      const state = params.get("state");
      const error = params.get("error");
      const errorDescription = params.get("error_description");

      if (error) {
        statusEl.className = "error";
        statusEl.textContent = "Zoom connection failed: " + error + (errorDescription ? " — " + errorDescription : "");
        return;
      }

      if (!code || !state) {
        statusEl.className = "error";
        statusEl.textContent = "Zoom did not return the details TrainerMate needs. Please try Connect with Zoom again.";
        return;
      }

      const localUrl =
        "http://127.0.0.1:5000/zoom/callback?" +
        new URLSearchParams({ code: code, state: state }).toString() +
        hash;

      statusEl.textContent = "Opening local TrainerMate callback…";

      const a = document.createElement("a");
      a.href = localUrl;
      a.className = "btn";
      a.textContent = "Open TrainerMate callback";
      manualEl.appendChild(a);

      setTimeout(function () {
        window.location.replace(localUrl);
      }, 350);
    })();
  </script>
</body>
</html>
