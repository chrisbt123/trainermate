<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">TrainerMate installer screenshot with install button highlighted</title>
  <desc id="desc">A simple annotated installer window showing the Install button and progress bar.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" x2="1">
      <stop offset="0" stop-color="#0f969f"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="960" height="600" rx="28" fill="url(#bg)"/>
  <rect x="92" y="70" width="680" height="440" rx="16" fill="#f8fbff" stroke="#cbdff4" filter="url(#shadow)"/>
  <rect x="92" y="70" width="680" height="42" rx="16" fill="#ffffff"/>
  <circle cx="122" cy="91" r="7" fill="#ef4444"/>
  <circle cx="146" cy="91" r="7" fill="#f59e0b"/>
  <circle cx="170" cy="91" r="7" fill="#22c55e"/>
  <text x="118" y="160" font-family="Segoe UI, Arial" font-size="42" font-weight="800" fill="#0f172a">TrainerMate Setup</text>
  <text x="118" y="196" font-family="Segoe UI, Arial" font-size="22" fill="#475569">Install TrainerMate for this Windows user.</text>
  <rect x="118" y="228" width="626" height="112" rx="4" fill="#ffffff" stroke="#dbe7f5"/>
  <text x="142" y="268" font-family="Segoe UI, Arial" font-size="19" font-weight="800" fill="#0f172a">Install location</text>
  <text x="142" y="302" font-family="Segoe UI, Arial" font-size="18" fill="#334155">C:\Users\You\AppData\Local\Programs\TrainerMate</text>
  <text x="118" y="382" font-family="Segoe UI, Arial" font-size="22" font-weight="800" fill="#0f172a">Ready to install.</text>
  <rect x="118" y="404" width="626" height="26" rx="2" fill="#e5e7eb" stroke="#cbd5e1"/>
  <rect x="118" y="404" width="210" height="26" rx="2" fill="#38bdf8"/>
  <rect x="118" y="458" width="132" height="48" rx="12" fill="url(#btn)"/>
  <text x="184" y="489" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" font-weight="800" fill="#ffffff">Install</text>
  <path d="M338 482h136" stroke="#f97316" stroke-width="5" stroke-linecap="round"/>
  <path d="M338 482l28-18M338 482l28 18" fill="none" stroke="#f97316" stroke-width="5" stroke-linecap="round"/>
  <rect x="474" y="426" width="298" height="76" rx="18" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="496" y="456" font-family="Segoe UI, Arial" font-size="19" font-weight="800" fill="#9a3412">Click Install</text>
  <text x="496" y="482" font-family="Segoe UI, Arial" font-size="17" fill="#7c2d12">then wait for the bar to finish.</text>
</svg>
