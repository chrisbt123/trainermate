<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Zoom connection screenshot with annotations</title>
  <desc id="desc">A simple annotated guide showing the user signing into Zoom, then clicking Connect Zoom in TrainerMate.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" x2="1">
      <stop offset="0" stop-color="#0f969f"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="960" height="600" rx="28" fill="url(#bg)"/>
  <rect x="60" y="64" width="410" height="410" rx="18" fill="#ffffff" stroke="#cbdff4" filter="url(#shadow)"/>
  <rect x="60" y="64" width="410" height="50" rx="18" fill="#f8fafc"/>
  <text x="94" y="97" font-family="Segoe UI, Arial" font-size="18" fill="#334155">zoom.us/signin</text>
  <text x="94" y="164" font-family="Segoe UI, Arial" font-size="40" font-weight="800" fill="#2563eb">zoom</text>
  <rect x="104" y="216" width="250" height="54" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="124" y="250" font-family="Segoe UI, Arial" font-size="18" fill="#64748b">Zoom email</text>
  <rect x="104" y="292" width="250" height="54" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="124" y="326" font-family="Segoe UI, Arial" font-size="18" fill="#64748b">Zoom password</text>
  <rect x="104" y="370" width="250" height="54" rx="16" fill="#2563eb"/>
  <text x="229" y="405" text-anchor="middle" font-family="Segoe UI, Arial" font-size="21" font-weight="800" fill="#ffffff">Sign in</text>
  <rect x="520" y="118" width="380" height="356" rx="18" fill="#ffffff" stroke="#cbdff4" filter="url(#shadow)"/>
  <text x="552" y="164" font-family="Segoe UI, Arial" font-size="27" font-weight="800" fill="#0f172a">Add Zoom account</text>
  <rect x="552" y="198" width="300" height="88" rx="16" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="574" y="232" font-family="Segoe UI, Arial" font-size="19" font-weight="800" fill="#0f172a">Step 1</text>
  <text x="574" y="258" font-family="Segoe UI, Arial" font-size="17" fill="#475569">Sign into Zoom in your browser.</text>
  <text x="574" y="324" font-family="Segoe UI, Arial" font-size="19" font-weight="800" fill="#0f172a">Step 2</text>
  <text x="574" y="350" font-family="Segoe UI, Arial" font-size="17" fill="#475569">Click the button below.</text>
  <rect x="574" y="382" width="178" height="56" rx="16" fill="url(#btn)"/>
  <text x="663" y="417" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" font-weight="800" fill="#ffffff">CONNECT ZOOM</text>
  <path d="M426 397h146" stroke="#f97316" stroke-width="5" stroke-linecap="round"/>
  <path d="M572 397l-28-18M572 397l-28 18" fill="none" stroke="#f97316" stroke-width="5" stroke-linecap="round"/>
  <rect x="278" y="490" width="458" height="62" rx="18" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="302" y="526" font-family="Segoe UI, Arial" font-size="19" font-weight="800" fill="#9a3412">Zoom will ask you to approve TrainerMate. Click Allow.</text>
</svg>
